name: Manuscript Quality

on:
  pull_request:
  workflow_dispatch:

jobs:
  manuscript-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check placeholders
        run: python scripts/check_placeholders.py

      - name: Build manuscript
        run: python scripts/build_book.py
