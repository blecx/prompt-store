name: Build Manuscript

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build combined manuscript
        run: python scripts/build_book.py

      - name: Upload manuscript artifact
        uses: actions/upload-artifact@v4
        with:
          name: book-manuscript
          path: dist/book-manuscript.md
